# source_registry.yaml — Registro de fontes de fact-check confiáveis
#
# Usado para: enriquecer resultados da Google Fact Check API com metadados locais,
# e futuramente para validar se um domínio enviado pelo usuário é uma fonte conhecida.
#
# Campos:
#   id:          Identificador único (snake_case)
#   name:        Nome exibível
#   domain:      Domínio principal (sem https://)
#   country:     Código ISO 3166-1 alpha-2
#   languages:   Idiomas cobertos (lista de BCP-47)
#   ifcn:        Signatária da IFCN (International Fact-Checking Network)? true/false
#   focus:       Temas principais (lista livre)
#   notes:       Observações opcionais

sources:

  # ── Brasil ───────────────────────────────────────────────────────────────────

  - id: agencia_lupa
    name: Agência Lupa
    domain: lupa.news
    country: BR
    languages: [pt]
    ifcn: true
    focus: [política, saúde, redes_sociais, eleições]
    notes: Primeira agência de fact-checking do Brasil (2015)

  - id: aos_fatos
    name: Aos Fatos
    domain: aosfatos.org
    country: BR
    languages: [pt]
    ifcn: true
    focus: [política, saúde, economia, ciência]
    notes: Especializada em jornalismo de dados

  - id: agencia_publica
    name: Agência Pública
    domain: apublica.org
    country: BR
    languages: [pt]
    ifcn: false
