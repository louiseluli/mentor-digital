name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Testes do bot (Python) ─────────────────────────────────────────────
  test-bot:
    name: Bot Tests (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bot

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/bot/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short
        env:
          PSEUDONYMIZATION_PEPPER: ci_test_pepper_operacional
          ANALYTICS_PEPPER: ci_test_pepper_analytics

  # ── 2. Type-check do frontend (Next.js) ───────────────────────────────────
  typecheck-web:
    name: Web TypeCheck (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

  # ── 3. Docker build do bot ────────────────────────────────────────────────
  docker-build:
    name: Docker Build (Bot)
    runs-on: ubuntu-latest
    needs: test-bot        # só constrói imagem se os testes passarem

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (sem push)
        uses: docker/build-push-action@v6
        with:
          context: apps/bot
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
